services:
  nats:
    image: nats:2-alpine
    command: ["-c", "/nats.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
      - "9222:9222"
    volumes:
      - nats-data:/data
      - ./nats.conf:/nats.conf:ro

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/videos;
        mc anonymous set download local/videos;
        echo 'Bucket ready (public download)';
      "

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      nats:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      NATS_URL: "nats://nats:4222"
      S3_ENDPOINT: "http://minio:9000"
      S3_REGION: "us-east-1"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_FORCE_PATH_STYLE: "true"
      TEMP_DIR: "/tmp/video-converter"
      HEALTH_PORT: "8080"
    ports:
      - "8080:8080"

  # Utility: generate test video and upload to MinIO
  test-setup:
    image: linuxserver/ffmpeg:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - test-data:/tmp/test
    entrypoint: >
      /bin/sh -c "
        echo 'Generating test video (1080p, 5s)...';
        ffmpeg -y -f lavfi -i color=c=blue:s=1920x1080:d=5 -c:v libx264 -preset ultrafast /tmp/test/test.mp4;
        echo 'Test video generated at /tmp/test/test.mp4';
      "

  test-upload:
    image: minio/mc
    depends_on:
      test-setup:
        condition: service_completed_successfully
    volumes:
      - test-data:/tmp/test
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc cp /tmp/test/test.mp4 local/videos/test.mp4;
        echo 'Uploaded to s3://videos/test.mp4';
        mc ls local/videos/;
      "

volumes:
  nats-data:
  minio-data:
  test-data:
