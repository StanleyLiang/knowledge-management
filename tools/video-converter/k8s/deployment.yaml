apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-converter
  labels:
    app: video-converter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: video-converter
  template:
    metadata:
      labels:
        app: video-converter
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: video-converter:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: video-converter-config
            - secretRef:
                name: video-converter-secret
          ports:
            - containerPort: 8080
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp/video-converter
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Gi
